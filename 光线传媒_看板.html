    // Extract arrays for ECharts
    const dates = raw.map(r => r[0]);
    const kdata = raw.map(r => [r[1], r[4], r[3], r[2]]); // [open, close, low, high]
    const volumes = raw.map(r => r[5]);

    // Summary stats
    const lastIdx = raw.length - 1;
    const last = raw[lastIdx];
    const first = raw[0];
    const lastClose = last[4];
    const lastPct = last[7];
    const rangeClose = ((lastClose - first[4]) / first[4] * 100).toFixed(2);
    const maxPrice = Math.max(...raw.map(r => r[3]));
    const minPrice = Math.min(...raw.map(r => r[2]));
    const totalVol = (raw.reduce((s, r) => s + r[5], 0) / 1e4).toFixed(0);

    document.getElementById('summaryStats').innerHTML = `
        <div class="stat-item">
            <div class="label">最新价</div>
            <div class="value ${lastPct >= 0 ? 'up' : 'down'}">${lastClose.toFixed(2)}</div>
            <div class="change ${lastPct >= 0 ? 'up' : 'down'}">${lastPct > 0 ? '+' : ''}${lastPct.toFixed(2)}%</div>
        </div>
        <div class="stat-item">
            <div class="label">区间涨跌</div>
            <div class="value ${parseFloat(rangeClose) >= 0 ? 'up' : 'down'}">${rangeClose > 0 ? '+' : ''}${rangeClose}%</div>
        </div>
        <div class="stat-item">
            <div class="label">最高</div>
            <div class="value">${maxPrice.toFixed(2)}</div>
        </div>
        <div class="stat-item">
            <div class="label">最低</div>
            <div class="value">${minPrice.toFixed(2)}</div>
        </div>
        <div class="stat-item">
            <div class="label">总成交量(万手)</div>
            <div class="value">${totalVol}</div>
        </div>
    `;

    // Color scheme: Chinese convention: red = up (涨), green = down (跌)
    const upColor = '#ef4444';
    const downColor = '#22c55e';
    const upBorder = '#dc2626';
    const downBorder = '#16a34a';

    // volume color per bar
    const volColors = raw.map(r => {
        // close >= open → up (red)
        return r[4] >= r[1] ? upColor : downColor;
    });

    // ============ K-line Chart ============
    const klineDom = document.getElementById('klineChart');
    const klineChart = echarts.init(klineDom);

    // Calculate MA5, MA10, MA20, MA60
    function calcMA(data, period) {
        const result = [];
        for (let i = 0; i < data.length; i++) {
            if (i < period - 1) { result.push(null); continue; }
            let sum = 0;
            for (let j = 0; j < period; j++) sum += data[i - j][4]; // close at index 4
            result.push(+(sum / period).toFixed(2));
        }
        return result;
    }
    const ma5 = calcMA(raw, 5);
    const ma10 = calcMA(raw, 10);
    const ma20 = calcMA(raw, 20);
    const ma60 = calcMA(raw, 60);

    const klineOption = {
        backgroundColor: '#fff',
        grid: [
            { left: '8%', right: '4%', top: '5%', height: '70%' },
            { left: '8%', right: '4%', top: '80%', height: '16%' }

            trigger: 'axis',
            axisPointer: { type: 'cross' },

            backgroundColor: 'rgba(255,255,255,0.96)',
            textStyle: { color: '#333', fontSize: 12 },

            formatter: function(params) {
                const k = params.find(p => p.seriesName === 'K线');
                if (!k) return '';
                const d = k.data;
                const idx = k.dataIndex;
                const r = raw[idx];
                const cls = r[4] >= r[1] ? 'val-up' : 'val-down';
                return `<div style="font-weight:600;margin-bottom:6px;font-size:13px">${r[0]}</div>

                    <div class="tooltip-row"><span class="label">最低</span><span>${r[2].toFixed(2)}</span></div>
                    <div class="tooltip-row"><span class="label">收盘</span><span class="${cls}">${r[4].toFixed(2)}</span></div>
                    <div class="tooltip-row"><span class="label">涨幅</span><span class="${cls}">${r[7] > 0 ? '+' : ''}${r[7].toFixed(2)}%</span></div>
                    <div class="tooltip-row"><span class="label">成交量</span><span>${(r[5]/10000).toFixed(2)}万手</span></div>

                fillerColor: 'rgba(15,52,96,0.15)',

                textStyle: { fontSize: 10 }

        series: [

                type: 'candlestick',
                data: kdata,
                itemStyle: {
                    color: upColor,
                    color0: downColor,
                    borderColor: upBorder,
                    borderColor0: downBorder

            {

                type: 'bar',
                xAxisIndex: 1,
                yAxisIndex: 1,
                data: volumes.map((v, i) => ({
                    value: v,
                    itemStyle: { color: volColors[i] }
                })),
                barWidth: '60%'
            }
        ]
    };

    klineChart.setOption(klineOption);

    // ============ Standalone Volume Chart ============
    const volDom = document.getElementById('volumeChart');
    const volChart = echarts.init(volDom);

    const volOption = {
        backgroundColor: '#fff',
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' },

                const p = params[0];
                const idx = p.dataIndex;

            }
        },
        grid: { left: '8%', right: '4%', top: '8%', bottom: '0%' },
        xAxis: {
            type: 'category',
            data: dates,
            boundaryGap: true,
            axisLabel: { fontSize: 10, color: '#888' },
            axisTick: { show: false },
            axisLine: { lineStyle: { color: '#ddd' } },
            splitLine: { show: false }

        yAxis: {
            type: 'value',
            axisLabel: {

                handleStyle: { color: '#0f3460' },

                itemStyle: { color: volColors[i], borderRadius: [1, 1, 0, 0] }

            barWidth: '60%',
            emphasis: {
                itemStyle: { shadowBlur: 6, shadowColor: 'rgba(0,0,0,0.15)' }

        }]
    };

    volChart.setOption(volOption);

    // Link zoom between charts
    klineChart.group = '光线传媒';
    volChart.group = '光线传媒';
    echarts.connect('光线传媒');

    // Sync tooltip / crosshair
    let hoverTimer = null;
    [klineChart, volChart].forEach(chart => {
        chart.on('mousemove', function(params) {
            clearTimeout(hoverTimer);
            hoverTimer = setTimeout(() => {
                [klineChart, volChart].forEach(c => {
                    c.dispatchAction({ type: 'showTip', seriesIndex: 0, dataIndex: params.dataIndex });
                });
            }, 30);
        });
        chart.on('mouseout', function() {
            [klineChart, volChart].forEach(c => c.dispatchAction({ type: 'hideTip' }));
        });
    });

    // Responsive
    window.addEventListener('resize', () => {
        klineChart.resize();
        volChart.resize();
    });
