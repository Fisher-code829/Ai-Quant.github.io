        // 计算 MA 均线
        function calcMA(data, n) {
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i < n - 1) { result.push(null); continue; }
                let sum = 0;
                for (let j = 0; j < n; j++) sum += data[i - j][4];
                result.push(+(sum / n).toFixed(2));
            }
            return result;
        }

        const dates = rawData.map(d => d[0]);
        const ohlc = rawData.map(d => [d[1], d[2], d[3], d[4]]);
        const volumes = rawData.map(d => ({
            value: d[5],
            itemStyle: { color: d[4] >= d[1] ? '#e74c3c' : '#27ae60' }
        }));

        // K线图
        const klineChart = echarts.init(document.getElementById('klineChart'));
        klineChart.setOption({
            tooltip: {
                trigger: 'axis', axisPointer: { type: 'cross' },
                formatter: function(params) {
                    const d = rawData[params[0].dataIndex];
                    return `<b>${d[0]}</b><br/>
                        开盘: ${d[1]}<br/>
                        收盘: <span style="color:${d[4]>=d[1]?'#e74c3c':'#27ae60'}">${d[4]}</span><br/>
                        最高: ${d[2]}<br/>
                        最低: ${d[3]}<br/>
                        涨跌幅: ${d[7]}%<br/>
                        成交量: ${(d[5]/10000).toFixed(1)}万手`;
                }
            },
            legend: { data: ['K线','MA5','MA10','MA20','MA60'], top: 5 },
            grid: { left: '8%', right: '3%', top: '12%', bottom: '8%' },
            xAxis: { type: 'category', data: dates, scale: true, boundaryGap: false },
            yAxis: { scale: true, splitLine: { show: true } },
            dataZoom: [
                { type: 'inside', start: 0, end: 100 },
                { show: true, type: 'slider', bottom: '2%', start: 0, end: 100 }
            ],
            series: [
                { name: 'K线', type: 'candlestick', data: ohlc,
                   itemStyle: { color: '#e74c3c', color0: '#27ae60', borderColor: '#e74c3c', borderColor0: '#27ae60' } },
                { name: 'MA5', type: 'line', data: calcMA(rawData, 5), smooth: true, lineStyle: { width: 1 } },
                { name: 'MA10', type: 'line', data: calcMA(rawData, 10), smooth: true, lineStyle: { width: 1 } },
                { name: 'MA20', type: 'line', data: calcMA(rawData, 20), smooth: true, lineStyle: { width: 1 } },
                { name: 'MA60', type: 'line', data: calcMA(rawData, 60), smooth: true, lineStyle: { width: 1 } }
            ]
        });

        // 成交量图
        const volChart = echarts.init(document.getElementById('volumeChart'));
        volChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '8%', right: '3%', top: '8%', bottom: '8%' },
            xAxis: { type: 'category', data: dates, scale: true, boundaryGap: false },
            yAxis: { type: 'value', scale: true },
            dataZoom: [
                { type: 'inside', start: 0, end: 100 },
                { show: true, type: 'slider', bottom: '2%', start: 0, end: 100 }
            ],
            series: [{ name: '成交量', type: 'bar', data: volumes }]
        });

        // 联动
        echarts.connect([klineChart, volChart]);
        window.addEventListener('resize', () => { klineChart.resize(); volChart.resize(); });
